name: Sync bus operator feeds

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nolu-feed-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger due feed synchronization
        env:
          NOLU_CRON_URL: ${{ secrets.NOLU_CRON_URL }}
          NOLU_CRON_SECRET: ${{ secrets.NOLU_CRON_SECRET }}
        run: |
          if [ -z "$NOLU_CRON_URL" ] || [ -z "$NOLU_CRON_SECRET" ]; then
            echo "Feed synchronization is prepared but not activated."
            exit 0
          fi
          curl --fail-with-body --silent --show-error \
            --retry 2 --retry-all-errors \
            --max-time 300 \
            -X POST \
            -H "Authorization: Bearer $NOLU_CRON_SECRET" \
            "$NOLU_CRON_URL/api/internal/cron/feeds"
